# Supabase project config. Generado a mano para Warica CRM.
# Run `supabase link --project-ref rijyyucrrbkcyovmxpby` la primera vez.

project_id = "warica-crm"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:5173"
additional_redirect_urls = [
  "http://localhost:5173",
  "https://crm.warica.com",
]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = false             # ← Warica: solo admin invita usuarios
enable_anonymous_sign_ins = false
enable_manual_linking = false

[auth.email]
enable_signup = false
double_confirm_changes = true
enable_confirmations = true

# Por default todas las functions requieren JWT (verify_jwt=true).
# health debe responder sin token para uptime monitors.
[functions.health]
verify_jwt = false

[functions.approve-quote]
verify_jwt = true

[functions.gcal-create-event]
verify_jwt = true

[storage]
enabled = true
file_size_limit = "50MiB"
