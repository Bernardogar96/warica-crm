<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/jpeg" href="/logo.jpeg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Warica CRM</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { height: 100%; }
      body {
        background: #faf9f5;
        color: #1a1713;
        font-family: 'DM Sans', sans-serif;
        font-feature-settings: "ss01", "cv11";
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: optimizeLegibility;
        letter-spacing: -0.008em;
      }
      ::-webkit-scrollbar { width: 8px; height: 8px; }
      ::-webkit-scrollbar-track { background: #f5f1e8; }
      ::-webkit-scrollbar-thumb { background: #d9cfb8; border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: #b8a989; }
      * { scrollbar-width: thin; scrollbar-color: #d9cfb8 #f5f1e8; }
      input:focus, textarea:focus, select:focus {
        border-color: #c15f3c !important;
        box-shadow: 0 0 0 3px rgba(193,95,60,0.12) !important;
      }
      button:active { transform: translateY(1px); }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
